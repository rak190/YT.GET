<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YT Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --red: #ff2d2d;
    --red-dim: #ff2d2d22;
    --white: #f0f0f0;
    --muted: #666;
    --success: #00e676;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; }

  header { text-align: center; margin-bottom: 48px; }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
  }
  .logo span { color: var(--red); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 20px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--red); }

  button {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 3px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 0 28px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Info panel */
  #info-panel { display: none; }

  .video-meta {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    align-items: flex-start;
  }

  .thumb {
    width: 140px;
    height: 79px;
    object-fit: cover;
    border-radius: 3px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .meta-text { flex: 1; min-width: 0; }
  .video-title {
    font-weight: 500;
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .video-sub { font-size: 12px; color: var(--muted); }

  .section-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .formats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }

  .fmt-btn {
    background: var(--bg);
    color: var(--white);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    letter-spacing: 0;
    cursor: pointer;
    transition: all 0.15s;
  }
  .fmt-btn:hover { border-color: var(--red); color: var(--red); }
  .fmt-btn.selected {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
  }
  .fmt-btn.audio {
    border-style: dashed;
  }

  .dl-btn {
    width: 100%;
    font-size: 22px;
    padding: 16px;
    border-radius: 3px;
  }

  /* Status */
  #status {
    border-radius: 3px;
    padding: 16px 20px;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 12px;
  }
  #status.loading { display: flex; background: #1a1a1a; border: 1px solid var(--border); color: var(--muted); }
  #status.success { display: flex; background: #00e67611; border: 1px solid var(--success); color: var(--success); }
  #status.error { display: flex; background: #ff2d2d11; border: 1px solid var(--red); color: var(--red); }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #333;
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .notice {
    font-size: 12px;
    color: #444;
    text-align: center;
    margin-top: 28px;
    line-height: 1.6;
  }
  .notice a { color: #555; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">YT<span>.</span>GET</div>
    <div class="tagline">Personal Video Downloader — runs locally</div>
  </header>

  <!-- URL Input -->
  <div class="card">
    <div class="input-row">
      <input type="text" id="url" placeholder="Paste YouTube URL here…" autocomplete="off"/>
      <button id="fetch-btn" onclick="fetchInfo()">FETCH</button>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text"></span>
  </div>

  <!-- Info + download panel -->
  <div class="card" id="info-panel">
    <div class="video-meta">
      <img class="thumb" id="thumb" src="" alt=""/>
      <div class="meta-text">
        <div class="video-title" id="vtitle"></div>
        <div class="video-sub" id="vsub"></div>
      </div>
    </div>
    <div class="section-label">Choose Format</div>
    <div class="formats" id="formats"></div>
    <button class="dl-btn" onclick="startDownload()">DOWNLOAD</button>
  </div>

  <p class="notice">
    Files are saved to your <strong>Downloads/YT-Downloads</strong> folder.<br/>
    For personal use only. Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a>.
  </p>
</div>

<script>
  let selectedFormat = null;
  let currentUrl = "";

  function setStatus(type, text) {
    const el = document.getElementById("status");
    el.className = type;
    document.getElementById("status-text").textContent = text;
    document.getElementById("spinner").style.display = type === "loading" ? "block" : "none";
  }

  function clearStatus() {
    document.getElementById("status").className = "";
    document.getElementById("status").style.display = "none";
  }

  async function fetchInfo() {
    const url = document.getElementById("url").value.trim();
    if (!url) return;
    currentUrl = url;
    selectedFormat = null;
    document.getElementById("info-panel").style.display = "none";
    document.getElementById("fetch-btn").disabled = true;
    setStatus("loading", "Fetching video info…");

    try {
      const res = await fetch("/info", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.error) { setStatus("error", data.error); return; }

      document.getElementById("thumb").src = data.thumbnail;
      document.getElementById("vtitle").textContent = data.title;
      document.getElementById("vsub").textContent =
        [data.channel, data.duration].filter(Boolean).join(" · ");

      const fmtsEl = document.getElementById("formats");
      fmtsEl.innerHTML = "";
      data.formats.forEach(f => {
        const btn = document.createElement("button");
        btn.className = "fmt-btn" + (f.type === "audio" ? " audio" : "");
        btn.textContent = f.label;
        btn.onclick = () => {
          document.querySelectorAll(".fmt-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedFormat = f.id;
        };
        fmtsEl.appendChild(btn);
      });

      clearStatus();
      document.getElementById("info-panel").style.display = "block";
    } catch (e) {
      setStatus("error", "Could not connect to server. Is server.py running?");
    } finally {
      document.getElementById("fetch-btn").disabled = false;
    }
  }

  async function startDownload() {
    if (!selectedFormat) {
      setStatus("error", "Please select a format first.");
      return;
    }
    setStatus("loading", "Downloading… this may take a minute.");
    try {
      const res = await fetch("/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: currentUrl, format: selectedFormat })
      });
      const data = await res.json();
      if (data.error) { setStatus("error", data.error); return; }
      setStatus("success", `✓ Downloaded! Saved to: ${data.path}`);
    } catch (e) {
      setStatus("error", "Download failed. Check that yt-dlp and ffmpeg are installed.");
    }
  }

  document.getElementById("url").addEventListener("keydown", e => {
    if (e.key === "Enter") fetchInfo();
  });
</script>
</body>
</html>
